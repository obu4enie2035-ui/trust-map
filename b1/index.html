<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Страница 2</title>
    
    <style>
        body {
            background: url('../bg.jpg') repeat; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 20px auto;
        }

        @media (max-width: 768px) {
            .slide-container {
                margin: 0 auto;
                max-width: 100%;
            }
        }

        .responsive-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Невидимая кликабельная зона, наложенная строго поверх кнопки "ПРОЙТИ ЧЕКАП" */
        .clickable-zone {
            position: absolute;
            bottom: 2.3%; 
            left: 36%;
            width: 28%;
            height: 3.2%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <img src="hero2.png" alt="Презентации: одинаковые симптомы — разные причины" class="responsive-img">
        
        <!-- ВСТАВЬТЕ ВАШУ ССЫЛКУ НА ЯНДЕКС ФОРМУ ВНУТРЬ КАВЫЧЕК ДИРЕКТИВЫ href НИЖЕ -->
        <a href="https://forms.yandex.ru/cloud/6a2fdca702848fae664c5da1" class="clickable-zone" title="Пройти чекап" target="_blank"></a>
    </div>

</body>
</html>
