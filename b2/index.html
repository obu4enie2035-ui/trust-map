<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Страница 3</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #25282B; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: #F1F3F5; 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 20px;
        }

        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }

        .editorial-header .passed { color: #25282B; }
        .editorial-header .passed:hover { color: #B82E12; }
        
        /* Второе слово СЦЕНАРИИ теперь горит фирменным алым капсом */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            background: url('../bg.jpg') repeat;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            margin: 0 auto 40px auto;
        }

        @media (max-width: 768px) {
            body { background-color: url('../bg.jpg') repeat; } 
            .slide-container { margin: 0 auto; max-width: 100%; box-shadow: none; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; margin-top: 0; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <!-- ВЕРХНИЙ ОБНОВЛЕННЫЙ МАРШРУТ (Внедрено слово СЦЕНАРИИ вместо вторых симптомов) -->
    <div class="editorial-header">
        <a href="../" class="passed">Проблема</a> ➔ 
        <a href="../b1/" class="passed">Симптомы</a> ➔ 
        <span class="current">СЦЕНАРИИ</span> ➔ 
        <span>Разрыв</span> ➔ 
        <span>Причина</span> ➔ 
        <span>Масштаб</span> ➔ 
        <span>Состав</span> ➔ 
        <span>Решение</span>
    </div>

    <div class="slide-container">
        <!-- Код ищет точное имя файла в вашей папке -->
        <img src="hero3.png" alt="Карта соответствия действий" class="responsive-img">
    </div>

</body>
</html>
