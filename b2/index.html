<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Шаг 2: Сценарии</title>
    
    <!-- Подключаем чистый швейцарский шрифт Inter -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: url('../bg.jpg') repeat; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* НАСТРОЙКА ВЕРХНЕГО ХЕДЕРА-МАРШРУТА */
        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: rgba(241, 243, 245, 0.9); /* Платиновый фон с легкой прозрачностью */
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 10px;
        }

        /* Стили ссылок на панели */
        .editorial-header a { color: #25282B; text-decoration: none; font-weight: 600; }
        .editorial-header a:hover { color: #B82E12; }
        /* Текущий шаг, где сейчас находится ЛПР */
        .editorial-header .current { color: #B82E12; font-weight: 700; border-bottom: 2px solid #B82E12; padding-bottom: 2px; }
        /* Будущие заблокированные шаги воронки */
        .editorial-header .locked { color: #A1A8B0; cursor: not-allowed; }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .slide-container { margin: 0 auto; max-width: 100%; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 10px 8px; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* НАСТРОЙКА НИЖНИХ КНОПОК НАВИГАЦИИ */
        .navigation-footer {
            width: 100%;
            max-width: 650px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 40px 0;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .btn-back {
            color: #71777E;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 20px;
        }
        .btn-back:hover { color: #25282B; }

        .btn-next {
            background-color: #B82E12; /* Наш фирменный алый */
            color: #FFFFFF;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 14px 28px;
            border-radius: 4px;
            letter-spacing: -0.01em;
            box-shadow: 0 2px 8px rgba(184, 46, 18, 0.2);
        }
        .btn-next:hover { background-color: #96230B; }
    </style>
</head>
<body>

    <!-- ВЕРХНЯЯ ИНТЕРАКТИВНАЯ ПАНЕЛЬ ПРОГРЕССА -->
    <div class="editorial-header">
        <a href="../">Проблема</a> ➔ 
        <a href="../b1/">[ Симптомы ]</a> ➔ 
        <span class="current">Разрыв</span> ➔ 
        <span class="locked">Причина</span> ➔ 
        <span class="locked">Масштаб</span> ➔ 
        <span class="locked">Состав</span> ➔ 
        <span class="locked">Решение</span>
    </div>

    <!-- ТЕЛО СЛАЙДА С КАРТОЙ СЦЕНАРИЕВ -->
    <div class="slide-container">
        <!-- Код выводит вашу картинку hero3.png, которую вы загрузили на прошлом шаге -->
        <img src="hero3.png" alt="Карта соответствия действий" class="responsive-img">
    </div>

    <!-- НИЖНИЙ КОМАНДНЫЙ КОНВЕЙЕР -->
    <div class="navigation-footer">
        <!-- Кнопка "Назад" бесшовно возвращает ЛПР в папку b1 (на Страницу 2) -->
        <a href="../b1/" class="btn-back">← Назад к потерям</a>
        
        <!-- Кнопка "Далее" поведет ЛПР на будущую Страницу 4 (папку b3) -->
        <a href="../b3/" class="btn-next">Далее к причинам ➔</a>
    </div>

</body>
</html>
